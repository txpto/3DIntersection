<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Brand mark</title>
</head>
<body>
<div class="card">
  <div class="row" style="align-items:center;gap:24px;padding:10px 0">
    <!-- mark: sphere + cube silhouette with intersection -->
    <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="sph" cx="40%" cy="38%" r="60%">
          <stop offset="0%" stop-color="#7be0ff"/>
          <stop offset="100%" stop-color="#2ac0ff"/>
        </radialGradient>
        <clipPath id="cubeClip"><rect x="42" y="24" width="46" height="46"/></clipPath>
      </defs>
      <!-- cube (wireframe) -->
      <g stroke="#f08cff" stroke-width="1.5" fill="none">
        <rect x="42" y="24" width="46" height="46"/>
        <path d="M42 24 L52 14 L98 14 L88 24"/>
        <path d="M98 14 L98 60 L88 70"/>
        <path d="M52 14 L52 60 L42 70" opacity=".45"/>
        <path d="M52 60 L98 60" opacity=".45"/>
      </g>
      <!-- sphere -->
      <circle cx="42" cy="54" r="26" fill="url(#sph)" opacity=".95"/>
      <!-- intersection region highlighted -->
      <g clip-path="url(#cubeClip)">
        <circle cx="42" cy="54" r="26" fill="#7dff7f" opacity=".55"/>
      </g>
    </svg>
    <div class="col" style="gap:4px">
      <div style="font-size:22px;font-weight:700;color:#d5dcff;letter-spacing:-0.01em">Intersección 3D</div>
      <div style="font-size:12px;color:#9fb0ff;letter-spacing:.02em">esfera ∩ cubo · visor de proyecciones</div>
    </div>
  </div>
  <div class="rule"></div>
  <div class="meta">No official logo in source · generated mark derived from primitives + intersection color</div>
</div>
</body>
</html>
