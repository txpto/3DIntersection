<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Foreground — lavender whites</title>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#02030a">
      <span class="name" style="color:#d5dcff;font-size:18px">fg / 1</span>
      <span class="hex" style="color:#d5dcff">#d5dcff</span>
    </div>
    <div class="swatch" style="background:#02030a">
      <span class="name" style="color:#c6d2ff;font-size:18px">fg / 2 · code</span>
      <span class="hex" style="color:#c6d2ff">#c6d2ff</span>
    </div>
    <div class="swatch" style="background:#02030a">
      <span class="name" style="color:#9fb0ff;font-size:18px">fg / 3 · label</span>
      <span class="hex" style="color:#9fb0ff">#9fb0ff</span>
    </div>
    <div class="swatch" style="background:#02030a">
      <span class="name" style="color:#8290d2;font-size:18px">fg / dim</span>
      <span class="hex" style="color:#8290d2">#8290d2</span>
    </div>
  </div>
  <div class="rule"></div>
  <div class="meta">Text is never pure white — always a cool lavender cast to sit on navy</div>
</div>
</body>
</html>
