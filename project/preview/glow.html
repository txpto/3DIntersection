<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Glow — data emission</title>
</head>
<body>
<div class="card">
  <div class="row" style="gap:20px;padding:14px 0">
    <div class="col grow" style="align-items:center;gap:12px">
      <div style="width:56px;height:56px;border-radius:50%;background:#2ac0ff;box-shadow:0 0 24px rgba(42,192,255,.6),0 0 48px rgba(42,192,255,.25)"></div>
      <span class="meta" style="color:#2ac0ff">glow / sphere</span>
    </div>
    <div class="col grow" style="align-items:center;gap:12px">
      <div style="width:56px;height:56px;background:#f08cff;box-shadow:0 0 24px rgba(240,140,255,.5),0 0 48px rgba(240,140,255,.22)"></div>
      <span class="meta" style="color:#f08cff">glow / cube</span>
    </div>
    <div class="col grow" style="align-items:center;gap:12px">
      <div style="width:56px;height:56px;border-radius:4px;background:#7dff7f;box-shadow:0 0 24px rgba(125,255,127,.55),0 0 48px rgba(125,255,127,.22)"></div>
      <span class="meta" style="color:#7dff7f">glow / hit</span>
    </div>
  </div>
  <div class="rule"></div>
  <div class="meta">Glow is reserved for data emission — never used as generic UI decoration</div>
</div>
</body>
</html>
