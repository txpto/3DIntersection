<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Data channel colors</title>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#0a0d1e;border-color:#2ac0ff33">
      <span style="display:flex;align-items:center;gap:10px">
        <span style="width:22px;height:22px;border-radius:50%;background:#2ac0ff;box-shadow:0 0 16px rgba(42,192,255,.55)"></span>
        <span class="name" style="color:#d5dcff">sphere / cyan</span>
      </span>
      <span class="hex" style="color:#2ac0ff">#2ac0ff</span>
    </div>
    <div class="swatch" style="background:#130a1e;border-color:#f08cff33">
      <span style="display:flex;align-items:center;gap:10px">
        <span style="width:22px;height:22px;background:#f08cff;box-shadow:0 0 16px rgba(240,140,255,.5)"></span>
        <span class="name" style="color:#d5dcff">cube / magenta</span>
      </span>
      <span class="hex" style="color:#f08cff">#f08cff</span>
    </div>
    <div class="swatch" style="background:#071508;border-color:#7dff7f33">
      <span style="display:flex;align-items:center;gap:10px">
        <span style="display:grid;grid-template-columns:repeat(3,3px);grid-template-rows:repeat(3,3px);gap:2px">
          <i style="background:#7dff7f"></i><i style="background:#7dff7f"></i><i style="background:#7dff7f"></i>
          <i style="background:#7dff7f"></i><i style="background:#7dff7f"></i><i style="background:#7dff7f"></i>
          <i style="background:#7dff7f"></i><i style="background:#7dff7f"></i><i style="background:#7dff7f"></i>
        </span>
        <span class="name" style="color:#d5dcff">intersection / mint</span>
      </span>
      <span class="hex" style="color:#7dff7f">#7dff7f</span>
    </div>
  </div>
  <div class="rule"></div>
  <div class="meta">Each primitive owns a color · intersection = success / positive metric</div>
</div>
</body>
</html>
