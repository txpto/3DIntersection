<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Spacing scale</title>
</head>
<body>
<div class="card">
  <div class="col" style="gap:8px">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:3px;height:24px;background:#7dff7f"></div>
      <span class="meta" style="width:70px">3 px</span>
      <span style="font-size:12px;color:#9fb0ff">chip padding y</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:6px;height:24px;background:#7dff7f"></div>
      <span class="meta" style="width:70px">6 px</span>
      <span style="font-size:12px;color:#9fb0ff">chip padding x</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:8px;height:24px;background:#7dff7f"></div>
      <span class="meta" style="width:70px">8 px</span>
      <span style="font-size:12px;color:#9fb0ff">label inset · metrics gap · radius panel</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:10px;height:24px;background:#7dff7f"></div>
      <span class="meta" style="width:70px">10 px</span>
      <span style="font-size:12px;color:#9fb0ff">HUD padding · HUD inset</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:16px;height:24px;background:#7dff7f;opacity:.7"></div>
      <span class="meta" style="width:70px">16 px</span>
      <span style="font-size:12px;color:#9fb0ff">composed layouts (system-added)</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:24px;height:24px;background:#7dff7f;opacity:.5"></div>
      <span class="meta" style="width:70px">24 px</span>
      <span style="font-size:12px;color:#9fb0ff">section gap (system-added)</span>
    </div>
  </div>
  <div class="rule"></div>
  <div class="meta">Tight technical rhythm · 3 / 6 / 8 / 10 dominate · larger steps rarely needed</div>
</div>
</body>
</html>
