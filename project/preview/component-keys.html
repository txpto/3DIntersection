<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Keys &amp; code chips</title>
</head>
<body>
<div class="card">
  <div class="col" style="gap:12px">
    <div style="font-size:14px;color:#d5dcff;line-height:1.8">
      <kbd style="display:inline-block;font-family:var(--font-mono);font-size:12px;color:#c6d2ff;background:#0b0f22;padding:3px 7px;border-radius:5px;border:1px solid #1f2b58;border-bottom-width:2px;margin-right:4px">W</kbd>
      <kbd style="display:inline-block;font-family:var(--font-mono);font-size:12px;color:#c6d2ff;background:#0b0f22;padding:3px 7px;border-radius:5px;border:1px solid #1f2b58;border-bottom-width:2px;margin-right:4px">A</kbd>
      <kbd style="display:inline-block;font-family:var(--font-mono);font-size:12px;color:#c6d2ff;background:#0b0f22;padding:3px 7px;border-radius:5px;border:1px solid #1f2b58;border-bottom-width:2px;margin-right:4px">S</kbd>
      <kbd style="display:inline-block;font-family:var(--font-mono);font-size:12px;color:#c6d2ff;background:#0b0f22;padding:3px 7px;border-radius:5px;border:1px solid #1f2b58;border-bottom-width:2px;margin-right:10px">D</kbd>
      <span style="color:#9fb0ff;font-size:12px">plano XZ</span>
      <span style="color:#25315f;margin:0 8px">·</span>
      <kbd style="display:inline-block;font-family:var(--font-mono);font-size:12px;color:#c6d2ff;background:#0b0f22;padding:3px 7px;border-radius:5px;border:1px solid #1f2b58;border-bottom-width:2px;margin-right:4px">Q</kbd>
      <kbd style="display:inline-block;font-family:var(--font-mono);font-size:12px;color:#c6d2ff;background:#0b0f22;padding:3px 7px;border-radius:5px;border:1px solid #1f2b58;border-bottom-width:2px;margin-right:10px">E</kbd>
      <span style="color:#9fb0ff;font-size:12px">eje Y</span>
    </div>
    <div style="font-size:13px;color:#d5dcff">
      Arrastra la
      <code style="font-family:var(--font-mono);color:#c6d2ff;background:#0b0f22;padding:2px 6px;border-radius:4px;border:1px solid #1f2b58">esfera</code>
      · mueve el
      <code style="font-family:var(--font-mono);color:#c6d2ff;background:#0b0f22;padding:2px 6px;border-radius:4px;border:1px solid #1f2b58">cubo</code>
    </div>
  </div>
  <div class="rule"></div>
  <div class="meta">Keys = kbd with heavier bottom border · inline code = flat chip · no actual key-cap SVGs</div>
</div>
</body>
</html>
