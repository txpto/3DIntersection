<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Axis label chip</title>
</head>
<body>
<div class="card">
  <div style="position:relative;height:140px;background:#050714;border-radius:8px;border:1px solid #1b2240;overflow:hidden">
    <!-- faux grid -->
    <svg width="100%" height="100%" style="position:absolute;inset:0;opacity:.4">
      <defs><pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f2d6a" stroke-width="0.5"/></pattern></defs>
      <rect width="100%" height="100%" fill="url(#g)"/>
    </svg>
    <span style="position:absolute;top:8px;left:8px;font-size:12px;letter-spacing:.02em;color:#9fb0ff;background:rgba(2,4,10,.7);padding:3px 6px;border:1px solid #263260;border-radius:5px;font-family:Inter,system-ui,sans-serif">Proyección XY (Z integrado)</span>
    <span style="position:absolute;top:8px;right:8px;font-size:12px;letter-spacing:.02em;color:#9fb0ff;background:rgba(2,4,10,.7);padding:3px 6px;border:1px solid #263260;border-radius:5px;font-family:Inter,system-ui,sans-serif">Proyección XZ</span>
    <span style="position:absolute;bottom:8px;left:8px;font-size:12px;letter-spacing:.02em;color:#9fb0ff;background:rgba(2,4,10,.7);padding:3px 6px;border:1px solid #263260;border-radius:5px;font-family:Inter,system-ui,sans-serif">Proyección YZ</span>
  </div>
  <div class="rule"></div>
  <div class="meta">12 / +2% · fg-3 on translucent void · 5px radius · 1px #263260 border · top-left inset 8px</div>
</div>
</body>
</html>
