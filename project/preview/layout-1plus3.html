<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Layout — 1 + 3</title>
</head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:2fr 1fr;height:200px;border:1px solid #1b2240;border-radius:8px;overflow:hidden;background:#02030a">
    <div style="border-right:1px solid #1b2240;background:radial-gradient(circle at 60% 50%, #0a1130 0%, #02030a 75%);position:relative">
      <span style="position:absolute;top:8px;left:8px;font-size:11px;color:#9fb0ff;background:rgba(2,4,10,.7);padding:3px 6px;border:1px solid #263260;border-radius:5px;font-family:Inter,sans-serif">Main 3D</span>
    </div>
    <div style="display:grid;grid-template-rows:repeat(3,1fr)">
      <div style="border-bottom:1px solid #1b2240;background:#050714;position:relative">
        <span style="position:absolute;top:6px;left:6px;font-size:10px;color:#9fb0ff;background:rgba(2,4,10,.7);padding:2px 5px;border:1px solid #263260;border-radius:4px;font-family:Inter,sans-serif">XY</span>
      </div>
      <div style="border-bottom:1px solid #1b2240;background:#050714;position:relative">
        <span style="position:absolute;top:6px;left:6px;font-size:10px;color:#9fb0ff;background:rgba(2,4,10,.7);padding:2px 5px;border:1px solid #263260;border-radius:4px;font-family:Inter,sans-serif">XZ</span>
      </div>
      <div style="background:#050714;position:relative">
        <span style="position:absolute;top:6px;left:6px;font-size:10px;color:#9fb0ff;background:rgba(2,4,10,.7);padding:2px 5px;border:1px solid #263260;border-radius:4px;font-family:Inter,sans-serif">YZ</span>
      </div>
    </div>
  </div>
  <div class="rule"></div>
  <div class="meta">grid-template-columns: 2fr 1fr · right column = repeat(3, 1fr) · 1px #1b2240 dividers</div>
</div>
</body>
</html>
