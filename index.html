<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intersección 3D: Esfera + Cubo</title>
    <link rel="icon" href="./favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./colors_and_type.css" />
    <style>
      html, body { height: 100%; margin: 0; }

      #app {
        display: grid;
        grid-template-columns: 2fr 1fr;
        height: 100vh;
        background: var(--bg-void);
        color: var(--fg-1);
        font-family: var(--font-sans);
      }

      #main3d {
        position: relative;
        border-right: 1px solid var(--border-1);
      }

      #projections {
        display: grid;
        grid-template-rows: repeat(3, 1fr);
      }

      .panel {
        border-bottom: 1px solid var(--border-1);
        position: relative;
        background: var(--bg-panel);
      }

      .panel:last-child {
        border-bottom: none;
      }

      /* Position override — .ds-label already handles the chip visual */
      .label {
        position: absolute;
        top: var(--space-3);
        left: var(--space-3);
      }

      #hud {
        position: absolute;
        bottom: var(--space-4);
        left: var(--space-4);
        max-width: 460px;
      }

      #hud code {
        font-family: var(--font-mono);
        color: var(--fg-2);
        background: #0b0f22;
        padding: 1px 6px;
        border-radius: 4px;
        border: 1px solid var(--border-2);
        font-size: 0.92em;
      }

      .runtime-panel {
        margin-top: var(--space-3);
        padding-top: var(--space-3);
        border-top: 1px solid var(--border-4);
        display: flex;
        gap: var(--space-4);
        align-items: center;
        flex-wrap: wrap;
        font-size: 11px;
      }

      .runtime-panel label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      #backendMode,
      #samplesPerAxis {
        font-family: var(--font-mono);
        font-size: 11px;
        background: #0b0f22;
        color: var(--fg-2);
        border: 1px solid var(--border-2);
        border-radius: 4px;
        padding: 2px 4px;
      }

      #samplesPerAxis { width: 56px; }

      #applyConfig {
        font-family: var(--font-sans);
        font-size: 11px;
        background: #0b0f22;
        color: var(--fg-1);
        border: 1px solid var(--border-3);
        border-radius: var(--radius-chip);
        padding: 3px 10px;
        cursor: pointer;
      }

      #applyConfig:hover { opacity: 0.85; }

      #perf {
        margin-top: 6px;
        color: var(--fg-3);
        font-size: 11px;
        font-family: var(--font-mono);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <section id="main3d">
        <div id="hud" class="ds-hud">
          <strong>Controles</strong><br />
          Arrastra la <code>esfera</code> con el ratón.<br />
          Mueve el <code>cubo</code> con <code>W A S D</code> (plano XZ) y <code>Q/E</code> (Y).<br />
          Rota el cubo con <code>I J K L U O</code>.<br />
          Ejecución activa por fases: F1/F2/F3 en marcha y F4 iniciada.
          <div id="metrics" class="ds-metrics">Intersección: <strong>no</strong></div>
          <div class="runtime-panel">
            <label>Backend:
              <select id="backendMode">
                <option value="worker" selected>worker</option>
                <option value="inline">inline</option>
              </select>
            </label>
            <label>Samples:
              <input id="samplesPerAxis" type="number" min="6" max="64" step="1" value="20" />
            </label>
            <button id="applyConfig" type="button">Aplicar</button>
          </div>
          <div id="perf">Perf: --</div>
        </div>
      </section>
      <section id="projections">
        <div class="panel">
          <span class="label ds-label">Proyección XY (Z integrado)</span>
          <canvas id="xy"></canvas>
        </div>
        <div class="panel">
          <span class="label ds-label">Proyección XZ (Y integrado)</span>
          <canvas id="xz"></canvas>
        </div>
        <div class="panel">
          <span class="label ds-label">Proyección YZ (X integrado)</span>
          <canvas id="yz"></canvas>
        </div>
      </section>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
